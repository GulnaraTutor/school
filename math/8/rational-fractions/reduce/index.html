<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сокращение дробей — MathLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== -->
<!-- LOGIN SCREEN -->
<!-- ===================== -->
<div id="loginScreen">
    <a href="../index.html" style="color:#2470ff; font-weight:bold; font-size:14px; text-decoration:none; position:absolute; top:20px; left:20px;">← Тема</a>
    <h2>Сокращение дробей</h2>
    <p class="subtitle">Введите имя, чтобы начать</p>
    <input id="studentName" type="text" placeholder="Ваше имя" maxlength="30">
    <button id="startBtn" type="button">Начать</button>
</div>

<!-- ===================== -->
<!-- GAME SCREEN -->
<!-- ===================== -->
<div id="gameScreen" class="container" style="display:none;">

    <header>
        <div id="lives" class="lives">❤️❤️❤️</div>
        <div id="stats" class="stats">0 / 15</div>
    </header>

    <h1>Сократи дробь</h1>
    <span id="levelTag" class="level-tag"></span>

    <div class="task-wrap">
        <div id="taskDisplay"></div>
    </div>

    <div id="options" class="options"></div>

</div>

<!-- ===================== -->
<!-- RESULT SCREEN -->
<!-- ===================== -->
<div id="resultScreen" style="display:none;">
    <div class="result-card">
        <div id="resultEmoji" class="result-emoji">🎉</div>
        <div id="resultMessage" class="result-message"></div>
        <div id="resultScore" class="result-score"></div>
        <button id="reviewMistakesBtn" type="button" class="review-btn" style="display:none;">🔍 Разбор ошибок</button>
        <button id="playAgainBtn" type="button" class="primary-btn">Играть снова</button>
    </div>
</div>

<!-- ===================== -->
<!-- MISTAKES REVIEW SCREEN -->
<!-- ===================== -->
<div id="mistakesScreen" style="display:none;">
    <div class="mistakes-card">
        <h2>Работа над ошибками</h2>
        <div id="mistakesList" class="mistakes-list"></div>
        <div class="mistakes-actions">
            <button id="backToResultBtn" type="button" class="secondary-btn">Назад</button>
            <button id="playAgainBtn2" type="button" class="primary-btn">Играть снова</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
