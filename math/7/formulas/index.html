<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathLab — Формулы сокращённого умножения</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <div class="stats">
          <div id="percent">100%</div>
        </div>

        <div class="lives">
            ❤️ ❤️ ❤️
        </div>

        <div class="progress">
            <div class="bar">
                <div class="fill"></div>
            </div>
            <span>0 / 15</span>
        </div>

    </header>

    <main>

        <h1>MathLab</h1>

        <h2>Формулы сокращённого умножения</h2>

        <div class="task">

            (3x − 5)²

        </div>

        <div class="answer"></div>

        <div class="result">

            Здесь будет собираться ответ

        </div>

        <button class="check">

            Проверить

        </button>
        <div class="finish">
    <input type="text" id="studentName" placeholder="Введите имя">
    <button id="saveResult">Сохранить результат</button>
</div>

<div id="history"></div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
