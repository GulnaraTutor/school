<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathLab</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== -->
<!-- LOGIN SCREEN -->
<!-- ===================== -->
<div id="loginScreen" class="login">

    <h2>Вход в MathLab</h2>

    <input type="text" id="studentName" placeholder="Введите имя">

    <button id="startBtn" type="button">Начать</button>

</div>

<!-- ===================== -->
<!-- GAME SCREEN -->
<!-- ===================== -->
<div id="gameScreen" style="display:none;">

<div class="container">

    <header>

        <div class="stats">
            <div id="percent">0 / 20</div>
        </div>

        <div class="lives">
            ❤️ ❤️ ❤️
        </div>

    </header>

    <main>

        <h1>MathLab</h1>
        <h2>Формулы сокращённого умножения</h2>

        <div class="task"></div>

        <div class="answer"></div>

        <div class="result">
            Здесь будет собираться ответ
        </div>

        <button class="check">Проверить</button>

    </main>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
